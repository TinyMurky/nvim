# ==========================================
# Tmux & Neovim 整合設定 (smart-splits.nvim)
# ==========================================

# 解除 C-b，設定為 C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- 基本設定 ---
# 啟用滑鼠支援 (可用滑鼠調整分割視窗大小、點選切換視窗)
set -g mouse on
# 開啟 Copy Mode 的 vi 模式 (這會讓 Space 變回選取功能)
setw -g mode-keys vi

# 設定視窗與面板索引從 1 開始 (方便鍵盤切換)
set -g base-index 1
setw -g pane-base-index 1

# 減少按鍵延遲 (改善 Vim 使用體驗)
set -s escape-time 0

# 提升歷史紀錄限制
set -g history-limit 50000

# 設定 Terminal 顏色 (支援 True Color)
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# --- 分割畫面操作 (Prefix 為 Ctrl+a) ---
# 邏輯與你的 Neovim 設定一致: Prefix + h/j/k/l
# 向下分割
bind-key j split-window -v -c "#{pane_current_path}"
# 向上分割
bind-key k split-window -vb -c "#{pane_current_path}"
# 向右分割
bind-key l split-window -h -c "#{pane_current_path}"
# 向左分割
bind-key h split-window -hb -c "#{pane_current_path}"

# --- Neovim & Tmux 無縫整合 (smart-splits.nvim) ---
# 這些設定會自動判斷當前是否在 Neovim 內。
# 如果在 Neovim 內，會將按鍵傳給 Neovim 處理；否則由 Tmux 切換面板。

# 偵測是否在 Vim 中
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# 🧭 移動游標 (Ctrl + hjkl)
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# 🚀 調整大小 (Alt + hjkl) 
# 如果你在 Mac 上，Alt 可能需要設定為 Option 鍵
bind-key -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'
bind-key -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind-key -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind-key -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'


# Ctrl + \ 切換回上一個活耀視窗
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# 在 Copy mode (複製模式) 也能使用這些快捷鍵
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# 讓 Copy Mode 的選取邏輯更貼近 Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# 在 Copy Mode 裡也可以用滑鼠選取
set -g mouse on
